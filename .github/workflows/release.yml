  #   name: Publish to PyPI
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write  # OIDC for Trusted Publishing
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist
  #     - name: Publish
  #       uses: pypa/gh-action-pypi-publish@release/v1
