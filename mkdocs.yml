site_name: topometry-nosc
site_description: "An independently maintained, heavily modified fork of TopOMetry."
site_url: https://HauserGroup.github.io/topometryNoSC/
repo_url: https://github.com/HauserGroup/topometryNoSC
repo_name: HauserGroup/topometryNoSC

watch:
  - docs
  - src/topo

theme:
  name: material
  logo: assets/topometry_logo.png
  favicon: assets/topometry_logo.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Nunito
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            merge_init_into_class: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Practical FAQ: faq.md
  - Tutorials:
      - Step by step: tutorials/step-by-step.md
      - Plotting: tutorials/plotting.md
      - Data provenance: tutorials/data-provenance.md
  - Concepts: concepts.md
  - Math details: math_details.md
  - Background &amp; reading: background.md
  - API Reference: api.md
  - Citation: citation.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
